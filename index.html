<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Quest for the Sacred Scroll</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 0;
    overflow-y: auto;
  }

  /* CRT Scanline Overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  #game {
    width: 720px;
    max-width: 95vw;
    background: #12122a;
    border: 3px solid #444;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(100, 60, 255, 0.3);
    padding: 24px;
    position: relative;
    margin: auto;
  }

  /* Screen transition */
  #screen-flash {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999;
    pointer-events: none;
  }

  #screen-flash.flash {
    display: block;
    animation: staticFlash 0.35s ease-out;
  }

  @keyframes staticFlash {
    0% { background: rgba(200, 200, 255, 0.3); }
    15% { background: rgba(0, 0, 0, 0.8); }
    30% { background: rgba(150, 150, 200, 0.15); }
    50% { background: rgba(0, 0, 0, 0.5); }
    70% { background: rgba(100, 100, 150, 0.05); }
    100% { background: transparent; }
  }

  /* Floor progress indicator */
  #floor-indicator {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 7px;
    color: #555;
  }

  #floor-indicator .floor-dot {
    width: 28px;
    height: 6px;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 3px;
    transition: all 0.5s;
  }

  #floor-indicator .floor-dot.active {
    background: #ffd700;
    border-color: #ffd700;
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
  }

  #floor-indicator .floor-dot.visited {
    background: #555;
    border-color: #666;
  }

  #floor-label {
    text-align: center;
    font-size: 7px;
    color: #666;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  #scene {
    min-height: 200px;
    margin-bottom: 20px;
  }

  #scene h2 {
    font-size: 11px;
    color: #ffd700;
    margin-bottom: 14px;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
  }

  #scene .art {
    font-size: 8px;
    line-height: 1.3;
    color: #7f7faf;
    white-space: pre;
    margin-bottom: 14px;
    text-align: center;
  }

  #scene p {
    font-size: 9px;
    line-height: 1.9;
    margin-bottom: 10px;
  }

  /* Dialogue portrait */
  .dialogue-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .portrait {
    flex-shrink: 0;
    font-size: 6px;
    line-height: 1.2;
    color: #9f9fcf;
    white-space: pre;
    background: #1a1a30;
    border: 1px solid #3a3a5a;
    border-radius: 4px;
    padding: 6px;
    text-align: center;
    min-width: 70px;
  }

  .portrait .portrait-name {
    display: block;
    font-size: 6px;
    color: #ffd700;
    margin-top: 4px;
    white-space: nowrap;
  }

  .dialogue-text {
    font-size: 9px;
    line-height: 1.9;
    flex: 1;
    padding-top: 2px;
  }

  #choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #choices button {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 12px 16px;
    background: #1e1e3a;
    color: #aac;
    border: 2px solid #3a3a6a;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }

  #choices button:hover {
    background: #2a2a5a;
    border-color: #ffd700;
    color: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
  }

  .stat-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 7px;
    color: #aaa;
  }

  .stat-bar .label { min-width: 90px; }

  .stat-bar .bar {
    flex: 1;
    height: 10px;
    background: #1a1a2e;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }

  .stat-bar .bar .fill {
    height: 100%;
    transition: width 0.5s;
  }

  #stats {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 14px;
  }

  .fill-willpower { background: linear-gradient(90deg, #ff4444, #ff8844, #44ff44); }
  .fill-sanity { background: linear-gradient(90deg, #4444ff, #8844ff, #44ffff); }

  .stars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  .scroll-reveal {
    background: linear-gradient(135deg, #2a1a0a, #1a1208);
    border: 3px solid #a08040;
    border-radius: 8px;
    padding: 24px;
    margin-top: 12px;
    box-shadow: 0 0 30px rgba(160, 128, 64, 0.3);
  }

  .scroll-reveal h3 {
    color: #ffd700;
    font-size: 10px;
    margin-bottom: 16px;
    text-align: center;
  }

  .scroll-reveal .letter-paragraph {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    line-height: 1.9;
    color: #d4c4a0;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .scroll-reveal .letter-paragraph.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Quest summary */
  .quest-summary {
    background: #1a1a30;
    border: 2px solid #3a3a6a;
    border-radius: 8px;
    padding: 20px;
    margin-top: 24px;
    text-align: center;
  }

  .quest-summary h3 {
    color: #ffd700;
    font-size: 10px;
    margin-bottom: 16px;
  }

  .quest-summary .stat-line {
    font-size: 8px;
    line-height: 2.4;
    color: #aac;
  }

  .quest-summary .stat-line span {
    color: #ffd700;
  }

  .fade-in { animation: fadeIn 1.2s ease-in; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .flavor { color: #888; font-style: italic; }

  /* Name input */
  #name-input {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 14px;
    background: #1a1a30;
    color: #ffd700;
    border: 2px solid #3a3a6a;
    border-radius: 6px;
    outline: none;
    width: 100%;
    max-width: 300px;
    margin: 10px 0;
    text-align: center;
  }

  #name-input:focus {
    border-color: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
  }

  .name-prompt {
    text-align: center;
    margin: 10px 0;
  }

  /* Game Over overlay */
  #game-over {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
    font-family: 'Press Start 2P', monospace;
  }

  #game-over.show { display: flex; }

  #game-over h1 {
    color: #ff4444;
    font-size: 24px;
    text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    animation: glitch 0.3s infinite;
  }

  #game-over p {
    color: #aaa;
    font-size: 10px;
    text-align: center;
    line-height: 2;
    max-width: 500px;
    padding: 0 20px;
  }

  #game-over .revive-text {
    color: #ffd700;
    font-size: 8px;
    animation: pulse 1.5s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-2px, 1px); }
    50% { transform: translate(2px, -1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Self-destruct countdown */
  #countdown-overlay {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
  }

  #countdown-overlay.show { display: block; }

  #countdown-label {
    font-size: 7px;
    color: #ff6666;
    margin-bottom: 8px;
    letter-spacing: 2px;
    animation: pulse 1s infinite;
  }

  #countdown-number {
    font-size: 32px;
    color: #ff4444;
    text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 40px rgba(255, 0, 0, 0.3);
  }

  #countdown-number.urgent {
    color: #ff0000;
    animation: glitch 0.15s infinite;
    font-size: 40px;
  }

  /* Explosion overlay */
  #explosion-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 3000;
    pointer-events: none;
  }

  #explosion-overlay.show {
    display: block;
    animation: explosionFlash 2s ease-out forwards;
  }

  @keyframes explosionFlash {
    0% { background: rgba(255, 255, 255, 1); }
    10% { background: rgba(255, 200, 50, 0.9); }
    20% { background: rgba(255, 100, 0, 0.7); }
    40% { background: rgba(255, 50, 0, 0.4); }
    70% { background: rgba(0, 0, 0, 0.2); }
    100% { background: transparent; }
  }

  /* Post-explosion message */
  #post-explosion {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a1a;
    z-index: 3001;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 24px;
    font-family: 'Press Start 2P', monospace;
  }

  #post-explosion.show { display: flex; }

  #post-explosion h2 {
    color: #ffd700;
    font-size: 14px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
  }

  #post-explosion p {
    color: #888;
    font-size: 8px;
    text-align: center;
    line-height: 2.2;
    max-width: 500px;
    padding: 0 20px;
  }

  #post-explosion .signature {
    color: #ffd700;
    font-size: 9px;
    margin-top: 10px;
  }

  /* Mobile */
  @media (max-width: 600px) {
    body { padding: 10px 0; }
    #game { padding: 16px; border-radius: 8px; }
    #scene h2 { font-size: 9px; }
    #scene .art { font-size: 6px; }
    #scene p { font-size: 8px; line-height: 1.8; }
    #choices button { font-size: 7px; padding: 10px 12px; }
    .stat-bar { font-size: 6px; gap: 5px; }
    .stat-bar .label { min-width: 70px; }
    #floor-indicator { gap: 5px; }
    #floor-indicator .floor-dot { width: 20px; height: 5px; }
    #floor-label { font-size: 6px; }
    .scroll-reveal { padding: 16px; }
    .scroll-reveal h3 { font-size: 8px; }
    .scroll-reveal .letter-paragraph { font-size: 12px; line-height: 1.7; }
    #game-over h1 { font-size: 16px; }
    #game-over p { font-size: 8px; }
    .portrait { min-width: 55px; font-size: 5px; padding: 4px; }
    .portrait .portrait-name { font-size: 5px; }
    .dialogue-text { font-size: 8px; }
    .quest-summary .stat-line { font-size: 7px; }
    #name-input { font-size: 8px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="screen-flash"></div>
<canvas id="confetti-canvas"></canvas>

<div id="countdown-overlay">
  <div id="countdown-label">THIS SCROLL WILL SELF-DESTRUCT IN</div>
  <div id="countdown-number">10</div>
</div>

<div id="explosion-overlay"></div>

<div id="post-explosion">
  <h2>SCROLL DESTROYED</h2>
  <p>The Sacred Scroll has self-destructed.<br><br>But the words remain.<br>You can't un-read a resignation.<br><br>Good luck out there.</p>
  <p class="signature">- Ryan, formerly of Recovre</p>
</div>

<div id="game-over">
  <h1>YOU HAVE DIED</h1>
  <p id="death-message"></p>
  <p class="revive-text" id="revive-text"></p>
</div>

<div id="game">
  <div id="floor-indicator">
    <div class="floor-dot" id="dot0"></div>
    <div class="floor-dot" id="dot1"></div>
    <div class="floor-dot" id="dot2"></div>
    <div class="floor-dot" id="dot3"></div>
    <div class="floor-dot" id="dot4"></div>
  </div>
  <div id="floor-label"></div>
  <div id="stats">
    <div class="stat-bar">
      <span class="label">WILL TO LIVE</span>
      <div class="bar"><div class="fill fill-willpower" id="wpFill" style="width:100%"></div></div>
      <span id="wpText">10/10</span>
    </div>
    <div class="stat-bar">
      <span class="label">SANITY</span>
      <div class="bar"><div class="fill fill-sanity" id="snFill" style="width:100%"></div></div>
      <span id="snText">10/10</span>
    </div>
  </div>
  <div id="scene"></div>
  <div id="choices"></div>
</div>

<script>
// ===================== AUDIO ENGINE =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playClick() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playWrong() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(250, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.07, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  o.start(); o.stop(audioCtx.currentTime + 0.3);
}

function playDeath() {
  ensureAudio();
  [400, 350, 280, 200].forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.08, audioCtx.currentTime + i * 0.2);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.2 + 0.2);
    o.start(audioCtx.currentTime + i * 0.2);
    o.stop(audioCtx.currentTime + i * 0.2 + 0.25);
  });
}

function playFanfare() {
  ensureAudio();
  const melody = [523, 659, 784, 1047, 784, 1047];
  const dur = [0.15, 0.15, 0.15, 0.3, 0.1, 0.5];
  let t = audioCtx.currentTime;
  melody.forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur[i]);
    o.start(t); o.stop(t + dur[i] + 0.05);
    t += dur[i];
  });
}

function playTypeChar() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square'; o.frequency.value = 800 + Math.random() * 200;
  g.gain.setValueAtTime(0.015, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
  o.start(); o.stop(audioCtx.currentTime + 0.03);
}

function playTransition() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(100, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.15);
  o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.04, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  o.start(); o.stop(audioCtx.currentTime + 0.35);
}

// ===================== SCREEN TRANSITION =====================
function screenTransition(callback) {
  playTransition();
  const flash = document.getElementById('screen-flash');
  flash.classList.remove('flash');
  void flash.offsetWidth; // reflow
  flash.classList.add('flash');
  setTimeout(() => {
    callback();
    setTimeout(() => flash.classList.remove('flash'), 200);
  }, 150);
}

// ===================== CONFETTI =====================
let confettiPieces = [];
let confettiRunning = false;
const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function startConfetti() {
  const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9ff3', '#54a0ff', '#5f27cd'];
  for (let i = 0; i < 150; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: Math.random() * confettiCanvas.height - confettiCanvas.height,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 1.5,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 8,
      opacity: 1
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    animateConfetti();
  }
}

function animateConfetti() {
  if (!confettiRunning) return;
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

  confettiPieces.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotSpeed;
    p.vy += 0.03;
    if (p.y > confettiCanvas.height) p.opacity -= 0.02;

    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    confettiCtx.globalAlpha = Math.max(0, p.opacity);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();
  });

  confettiPieces = confettiPieces.filter(p => p.opacity > 0);
  if (confettiPieces.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiRunning = false;
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

// ===================== STARS =====================
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.opacity = Math.random() * 0.5 + 0.1;
  starsEl.appendChild(s);
}

// ===================== PORTRAITS =====================
const PORTRAITS = {
  guard: { art: ' ___\n|o_o|\n|___|', name: 'GUARD' },
  cameron: { art: ' ___\n|^_^|\n|~~~|', name: 'CAMERON' },
  pm: { art: ' ___\n|>_<|\n|___|', name: 'PM' },
  wizard: { art: ' /\\\\\n|o.o|\n|___|', name: 'IT WIZ' },
  eagle: { art: ' /V\\\\\n(o o)\n \\~/', name: 'EAGLE' },
  lisa: { art: ' ___\n|-_-|\n|___|', name: 'LISA' },
};

// ===================== GAME STATE =====================
let willpower = 10, sanity = 10;
const maxStat = 10;
let currentFloor = 0;
let pendingScene = null;
let typewriterAbort = null;
let playerName = 'Traveler';

// Tracking stats for quest summary
let totalSanityLost = 0;
let totalWillpowerLost = 0;
let meetingsSurvived = 0;

const floorNames = ['LOBBY', 'STAIRWELL', 'BREAK ROOM', 'FLOOR 3', 'THE DEPTHS'];

function setFloor(n) {
  currentFloor = n;
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('dot' + i);
    dot.className = 'floor-dot';
    if (i < n) dot.classList.add('visited');
    if (i === n) dot.classList.add('active');
  }
  document.getElementById('floor-label').textContent = n < 5 ? floorNames[n] : '';
}

function setWP(v) {
  const old = willpower;
  willpower = Math.max(0, Math.min(maxStat, v));
  if (willpower < old) totalWillpowerLost += (old - willpower);
  document.getElementById('wpFill').style.width = (willpower / maxStat * 100) + '%';
  document.getElementById('wpText').textContent = willpower + '/' + maxStat;
  if (willpower <= 0) triggerDeath('willpower');
}

function setSN(v) {
  const old = sanity;
  sanity = Math.max(0, Math.min(maxStat, v));
  if (sanity < old) totalSanityLost += (old - sanity);
  document.getElementById('snFill').style.width = (sanity / maxStat * 100) + '%';
  document.getElementById('snText').textContent = sanity + '/' + maxStat;
  if (sanity <= 0) triggerDeath('sanity');
}

// ===================== DEATH FAKE-OUT =====================
function triggerDeath(type) {
  deathCount++;
  playDeath();
  const overlay = document.getElementById('game-over');
  const msg = document.getElementById('death-message');
  const revive = document.getElementById('revive-text');

  if (type === 'willpower') {
    msg.innerHTML = 'Your Will to Live has reached zero.<br><br>' + playerName + ' attempts to lie down in the stairwell and accept their fate.<br><br>Unfortunately, HR has denied your death request.<br>Reason: "Insufficient PTO balance for permanent leave."';
  } else {
    msg.innerHTML = 'Your Sanity has reached zero.<br><br>' + playerName + ' begins speaking entirely in corporate buzzwords.<br>"Let\'s leverage our core synergies to action a paradigm shift."<br><br>A passing manager promotes you. You decline.';
  }

  revive.textContent = '';
  overlay.classList.add('show');

  setTimeout(() => { revive.textContent = 'RETURN TO YOUR DESK IN 3...'; }, 2500);
  setTimeout(() => { revive.textContent = 'RETURN TO YOUR DESK IN 2...'; }, 3500);
  setTimeout(() => { revive.textContent = 'RETURN TO YOUR DESK IN 1...'; }, 4500);
  setTimeout(() => {
    overlay.classList.remove('show');
    willpower = Math.max(willpower, 3);
    sanity = Math.max(sanity, 3);
    setWP(willpower);
    setSN(sanity);
    if (pendingScene) pendingScene();
  }, 5500);
}

// ===================== TYPEWRITER =====================
function typewrite(element, html, callback) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  element.innerHTML = '';
  element.style.visibility = 'visible';

  let cancelled = false;
  typewriterAbort = () => { cancelled = true; };

  let charIndex = 0;
  const speed = 22;
  let inTag = false;
  let displayHtml = '';

  function tick() {
    if (cancelled) { element.innerHTML = html; if (callback) callback(); return; }
    if (charIndex >= html.length) { element.innerHTML = html; if (callback) callback(); return; }

    const ch = html[charIndex];
    if (ch === '<') inTag = true;
    if (inTag) {
      let tagEnd = html.indexOf('>', charIndex);
      if (tagEnd === -1) tagEnd = html.length - 1;
      displayHtml += html.substring(charIndex, tagEnd + 1);
      charIndex = tagEnd + 1;
      if (ch !== '<' || html[charIndex - 1] === '>') inTag = false;
    } else {
      displayHtml += ch;
      charIndex++;
      if (ch !== ' ' && Math.random() > 0.6) playTypeChar();
    }
    element.innerHTML = displayHtml;
    setTimeout(tick, inTag ? 0 : speed);
  }
  tick();
}

// ===================== RENDERER =====================
function render(scene, skipTransition) {
  const doRender = () => {
    roomsVisited++;
    const sceneEl = document.getElementById('scene');
    const choicesEl = document.getElementById('choices');
    sceneEl.innerHTML = '';
    choicesEl.innerHTML = '';

    if (typewriterAbort) { typewriterAbort(); typewriterAbort = null; }

    if (scene.art) {
      const art = document.createElement('div');
      art.className = 'art';
      art.textContent = scene.art;
      sceneEl.appendChild(art);
    }

    if (scene.title) {
      const h2 = document.createElement('h2');
      h2.textContent = scene.title;
      sceneEl.appendChild(h2);
    }

    // Build elements: mix of plain text, dialogue with portraits
    const elements = [];
    scene.text.forEach(t => {
      if (t.portrait) {
        // Dialogue with portrait
        const row = document.createElement('div');
        row.className = 'dialogue-row';

        const port = document.createElement('div');
        port.className = 'portrait';
        const pInfo = PORTRAITS[t.portrait] || { art: '?', name: '???' };
        port.textContent = pInfo.art;
        const nameSpan = document.createElement('span');
        nameSpan.className = 'portrait-name';
        nameSpan.textContent = pInfo.name;
        port.appendChild(nameSpan);

        const textDiv = document.createElement('div');
        textDiv.className = 'dialogue-text';
        textDiv.style.visibility = 'hidden';
        textDiv.dataset.html = t.text;

        row.appendChild(port);
        row.appendChild(textDiv);
        sceneEl.appendChild(row);
        elements.push({ el: textDiv, html: t.text });
      } else {
        const p = document.createElement('p');
        p.style.visibility = 'hidden';
        const html = typeof t === 'string' ? t : t.text;
        p.dataset.html = html;
        sceneEl.appendChild(p);
        elements.push({ el: p, html: html });
      }
    });

    function typeNextElement(index) {
      if (index >= elements.length) {
        if (scene.html) {
          const div = document.createElement('div');
          div.innerHTML = scene.html;
          div.className = 'fade-in';
          sceneEl.appendChild(div);
          if (scene.revealLetter) setTimeout(() => revealLetterParagraphs(), 500);
        }
        if (scene.summaryHtml) {
          const sumDiv = document.createElement('div');
          sumDiv.innerHTML = scene.summaryHtml;
          sumDiv.className = 'fade-in';
          sumDiv.style.opacity = '0';
          sumDiv.style.transition = 'opacity 1s ease';
          sceneEl.appendChild(sumDiv);
          setTimeout(() => { sumDiv.style.opacity = '1'; }, 1000);
        }
        showChoices(scene.choices || []);
        return;
      }
      const item = elements[index];
      typewrite(item.el, item.html, () => typeNextElement(index + 1));
    }

    sceneEl.className = 'fade-in';
    sceneEl.addEventListener('click', () => { if (typewriterAbort) typewriterAbort(); }, { once: false });

    typeNextElement(0);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (skipTransition) {
    doRender();
  } else {
    screenTransition(doRender);
  }
}

function showChoices(choices) {
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.textContent = c.text;
    btn.style.opacity = '0';
    btn.style.transform = 'translateY(8px)';
    btn.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    btn.addEventListener('click', () => {
      if (c.shake) {
        playWrong();
        document.getElementById('game').classList.add('shake');
        setTimeout(() => document.getElementById('game').classList.remove('shake'), 500);
      } else {
        playClick();
      }
      pendingScene = c.action;
      if (c.wp) setWP(willpower + c.wp);
      if (c.sn) setSN(sanity + c.sn);
      if (willpower > 0 && sanity > 0) c.action();
    });
    choicesEl.appendChild(btn);
    setTimeout(() => { btn.style.opacity = '1'; btn.style.transform = 'translateY(0)'; }, 100 + i * 120);
  });
}

// ===================== LETTER REVEAL =====================
function revealLetterParagraphs() {
  const paragraphs = document.querySelectorAll('.letter-paragraph');
  paragraphs.forEach((p, i) => {
    setTimeout(() => p.classList.add('visible'), i * 600);
  });

  // After all paragraphs revealed, set up scroll-bottom detection
  const totalRevealTime = paragraphs.length * 600 + 1000;
  setTimeout(() => setupScrollDetection(), totalRevealTime);
}

// ===================== SELF-DESTRUCT =====================
let selfDestructStarted = false;
let countdownInterval = null;

function setupScrollDetection() {
  const lastParagraph = document.querySelector('.letter-paragraph:last-child');
  if (!lastParagraph) return;

  // Approach 1: IntersectionObserver with low threshold
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !selfDestructStarted) {
        selfDestructStarted = true;
        observer.disconnect();
        window.removeEventListener('scroll', scrollFallback);
        startSelfDestruct();
      }
    });
  }, { threshold: 0.1 });

  observer.observe(lastParagraph);

  // Approach 2: scroll listener fallback
  function scrollFallback() {
    if (selfDestructStarted) return;
    const rect = lastParagraph.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) {
      selfDestructStarted = true;
      observer.disconnect();
      window.removeEventListener('scroll', scrollFallback);
      startSelfDestruct();
    }
  }

  window.addEventListener('scroll', scrollFallback);
  // Also check immediately in case already scrolled
  scrollFallback();
}

function playExplosion() {
  ensureAudio();
  // Rumble
  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / data.length);
  noise.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.12, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
  noise.connect(g); g.connect(audioCtx.destination);
  noise.start();

  // Boom tone
  const o = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  o.connect(g2); g2.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(80, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1);
  g2.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
  o.start(); o.stop(audioCtx.currentTime + 1);
}

function playTick() {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'square'; o.frequency.value = 1000;
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  o.start(); o.stop(audioCtx.currentTime + 0.06);
}

function startSelfDestruct() {
  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-number');
  overlay.classList.add('show');

  let count = 10;
  numEl.textContent = count;
  playTick();

  countdownInterval = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(countdownInterval);
      overlay.classList.remove('show');
      triggerExplosion();
      return;
    }
    numEl.textContent = count;
    if (count <= 3) numEl.classList.add('urgent');
    playTick();
  }, 1000);
}

function triggerExplosion() {
  playExplosion();

  // Fire massive confetti burst
  const colors = ['#ff4444', '#ff8800', '#ffd700', '#ff6b6b', '#ffaa00', '#ffffff'];
  for (let i = 0; i < 300; i++) {
    confettiPieces.push({
      x: confettiCanvas.width / 2 + (Math.random() - 0.5) * 100,
      y: confettiCanvas.height / 2,
      w: Math.random() * 10 + 3,
      h: Math.random() * 8 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 0.5) * 20 - 5,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 15,
      opacity: 1
    });
  }
  if (!confettiRunning) { confettiRunning = true; animateConfetti(); }

  // Flash
  const explosionOverlay = document.getElementById('explosion-overlay');
  explosionOverlay.classList.add('show');

  // Shake the whole page
  document.body.style.animation = 'shake 0.1s 6';
  setTimeout(() => { document.body.style.animation = ''; }, 700);

  // After flash, show post-explosion screen
  setTimeout(() => {
    explosionOverlay.classList.remove('show');
    document.getElementById('game').style.display = 'none';
    document.getElementById('post-explosion').classList.add('show');
  }, 2500);
}

/* THE FINALE */

function finale() {
  setWP(maxStat);
  setSN(maxStat);
  document.getElementById('floor-label').textContent = 'FREEDOM';
  for (let i = 0; i < 5; i++) document.getElementById('dot' + i).classList.add('active');
  playFanfare();
  startConfetti();

  // Build summary
  const summaryLines = [];
  summaryLines.push('<div class="stat-line">Adventurer: <span>' + playerName + '</span></div>');
  summaryLines.push('<div class="stat-line">Rooms Explored: <span>' + roomsVisited + '</span></div>');
  summaryLines.push('<div class="stat-line">Meetings Survived: <span>' + meetingsSurvived + '</span></div>');
  summaryLines.push('<div class="stat-line">Sanity Lost: <span>' + totalSanityLost + ' points</span></div>');
  summaryLines.push('<div class="stat-line">Will to Live Lost: <span>' + totalWillpowerLost + ' points</span></div>');
  summaryLines.push('<div class="stat-line">Times Died at Desk: <span>' + deathCount + '</span></div>');
  if (granolaEaten) summaryLines.push('<div class="stat-line">Expired Granola Bars Consumed: <span>1 (brave)</span></div>');
  if (coffeeConsumed) summaryLines.push('<div class="stat-line">Day-Old Coffee Consumed: <span>1 (desperate)</span></div>');
  if (cameronEncountered) summaryLines.push('<div class="stat-line">Fish Microwaved by Cameron: <span>too many</span></div>');
  summaryLines.push('<div class="stat-line" style="margin-top:10px;color:#ffd700;">Status: <span>FREE</span></div>');

  const summaryHtml = '<div class="quest-summary"><h3>~ QUEST COMPLETE ~</h3>' + summaryLines.join('') + '</div>';

  render({
    title: 'THE SACRED SCROLL HAS BEEN CLAIMED',
    text: [
      'The fluorescent lights flicker and die. Natural sunlight pours through the windows for the first time.',
      n('{NAME}\'s Outlook calendar clears itself. Their Slack status changes to "Free."'),
      'You unroll the scroll and begin to read...',
    ],
    revealLetter: true,
    summaryHtml: summaryHtml,
    html: `
      <div class="scroll-reveal">
        <h3>~ THE SACRED SCROLL ~</h3>
        <div class="letter-paragraph">Dear Chandra,</div>
        <div class="letter-paragraph">After a fair bit of thought, and a prognosis I'm comfortable calling excellent, I'm writing to formally resign from my position at Recovre, effective 8 May 2026. The plan from here is a graduated return to autonomy, commencing immediately.</div>
        <div class="letter-paragraph">I'll be straight about what's brought me to this point, because it matters more than the usual line about "new opportunities." For the better part of two years now, I've felt professionally stagnant and genuinely unchallenged in a role that offered very little when it came to leadership development or progression. That frustration is a big part of why I put $70,000 of my own money into an MBA. It wasn't a vanity exercise. I wanted to grow in ways Recovre wasn't giving me the chance to. I don't regret the investment for a second, but I do find it telling that the skills and perspective I picked up along the way mostly served to widen the gap between where I was heading and where Recovre appeared to be standing still.</div>
        <div class="letter-paragraph">The MBA also had the inconvenient side effect of sharpening my eye for poor strategic leadership. I say this with no pleasure: in my view, Recovre lacks clear direction, meaningful differentiation in a competitive market, and the calibre of leadership required to fix either. These aren't new problems, and they're not the kind that resolve themselves through another restructure, another town hall, or another round of values workshopping. I've watched this organisation rearrange the furniture while the foundations shift, and I'd rather not be in the building when the architecture is tested.</div>
        <div class="letter-paragraph">Closer to home, the state of the WA team is a case in point. Towards the tail end of last year, myself and the other PCs raised concerns about the structural fragility of the team and the trajectory we were heading on. I know you were across those conversations, and I also know the levers available to you as a manager aren't always the ones that need pulling. The reality is that decisions made, or more accurately not made, above and around us have left the team in exactly the position we flagged. I'm not saying this to point fingers at you personally. I'm saying it because this letter should reflect what actually happened, not a tidied-up version of it. The warning signs were there. The window to act on them has since closed.</div>
        <div class="letter-paragraph">While I'm on the subject of structural frustrations, I'd be remiss not to mention HR Services, an entity I've come to regard with the same cautious optimism you'd give a vending machine that's taken your money before. Over my time here, I raised a number of queries and concerns through the proper channels. The pattern was remarkably consistent. First, acknowledgement of the ticket. Then a brief silence that suggested careful deliberation. Then a longer silence that suggested the ticket had been forgotten entirely. And finally, the coup de gr\u00e2ce: a notification that the matter had been closed. Resolved, apparently, by the passage of time and the quiet hope I'd stop asking. I didn't stop asking. They did, however, stop answering. If nothing else, it was a masterclass in managed disengagement.</div>
        <div class="letter-paragraph">None of the above should overshadow the fact that my departure isn't a reflection of you as a manager, or of the people I've worked alongside. The mission of getting injured workers back on their feet, back to meaningful employment, and back to their lives matters, and I'm proud to have been part of it. The colleagues I've worked with in WA are talented, dedicated, and deserving of far better support than they've been given. I leave them with enormous respect and, should any of them ever need a consultant who already knows where the bodies are buried, my details won't be hard to find.</div>
        <div class="letter-paragraph">I'll of course see out my notice period with full duties and no restrictions. Consider this my Certificate of Capacity: unrestricted, no review required.</div>
        <div class="letter-paragraph">Thanks, Chandra, for your support during my time here. I've valued our working relationship and I wish you and the team genuinely well, with the sincere hope that someone, somewhere, finally reads the notes from last year.</div>
        <div class="letter-paragraph">Yours professionally, and with zero residual bitterness,</div>
        <div class="letter-paragraph">Ryan<br>Principal Consultant<br>Recovre, WA (Outgoing)</div>
      </div>
    `,
    choices: []
  });
}
